execution:
    fill_mode: "next_close"
    qty: 0.001

    fees:
      rate: 0.001

    slippage:
      bps: 5
      vol_k: 0.0
      
    risk_limits:
      enabled: true
      max_position: 5
      max_notional_per_day: 25000
      max_trades_per_hour: 12
      cooldown_minutes: 5
      cooldown_override: false

    circuit_breakers:
      enabled: true
      fail_closed: true
      state_path: artifacts/execution/circuit_breaker_state.json
  
    incident_artifacts:
      output_dir: artifacts/incidents